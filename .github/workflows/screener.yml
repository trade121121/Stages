name: weekly-screener
on:
  schedule:
    - cron: "0 7 * * 0"        # sonntags 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m screener.main
      - name: commit dashboard
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "weekly run $(date -u +%F)"
          git push
